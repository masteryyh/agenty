[package]
name = "agenty-bootstrap"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Self-extracting launcher for agenty: verifies, extracts and starts the bundled CLI and runtime"

[dependencies]
liblzma = { version = "0.4", default-features = false, features = ["static"] }
sha3 = "0.12"
dirs = "6"

[profile.release]
lto = true
strip = true
