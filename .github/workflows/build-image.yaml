name: Build images

on:
  push:
    tags:
      - v*.*.*
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes in images
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          ZERO="0000000000000000000000000000000000000000"

          if [ "$BEFORE" = "$ZERO" ]; then
            BASE=$(git hash-object -t tree /dev/null)
          else
            BASE=$(git merge-base "$BEFORE" "$HEAD" 2>/dev/null || echo "$BEFORE")
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- images/ .github/workflows/build-image.yaml)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  build-amd64:
    name: Build prag (amd64)
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: images/prag
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/prag:amd64
          outputs: type=docker,dest=prag-amd64.tar
          platforms: linux/amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: Upload amd64 image artifact
        uses: actions/upload-artifact@v4
        with:
          name: prag-amd64
          path: prag-amd64.tar
          retention-days: 1

  build-arm64:
    name: Build prag (arm64)
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: images/prag
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/prag:arm64
          outputs: type=docker,dest=prag-arm64.tar
          platforms: linux/arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

      - name: Upload arm64 image artifact
        uses: actions/upload-artifact@v7
        with:
          name: prag-arm64
          path: prag-arm64.tar
          retention-days: 1

  merge-manifest:
    name: Merge multi-arch manifest
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Download amd64 image artifact
        uses: actions/download-artifact@v8
        with:
          name: prag-amd64

      - name: Download arm64 image artifact
        uses: actions/download-artifact@v8
        with:
          name: prag-arm64

      - name: Login to Docker registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Load images and push
        run: |
          docker load -i prag-amd64.tar
          docker load -i prag-arm64.tar
          docker push ${{ secrets.DOCKER_USERNAME }}/prag:amd64
          docker push ${{ secrets.DOCKER_USERNAME }}/prag:arm64

      - name: Create and push multi-arch manifest
        run: |
          docker manifest rm ${{ secrets.DOCKER_USERNAME }}/prag:latest 2>/dev/null || true
          docker manifest rm ${{ secrets.DOCKER_USERNAME }}/prag:18-alpine 2>/dev/null || true
          docker manifest create ${{ secrets.DOCKER_USERNAME }}/prag:latest \
            ${{ secrets.DOCKER_USERNAME }}/prag:amd64 \
            ${{ secrets.DOCKER_USERNAME }}/prag:arm64
          docker manifest create ${{ secrets.DOCKER_USERNAME }}/prag:18-alpine \
            ${{ secrets.DOCKER_USERNAME }}/prag:amd64 \
            ${{ secrets.DOCKER_USERNAME }}/prag:arm64
          docker manifest push ${{ secrets.DOCKER_USERNAME }}/prag:latest
          docker manifest push ${{ secrets.DOCKER_USERNAME }}/prag:18-alpine

      - name: Sign Docker image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ secrets.DOCKER_USERNAME }}/prag:latest \
            2>&1 | awk '/^Digest:/{print $2}')
          [ -n "$DIGEST" ] || { echo "ERROR: Failed to retrieve image digest"; exit 1; }
          cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/prag@${DIGEST}
