name: Publish release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  precheck:
    name: Resolve release metadata
    runs-on: ubuntu-26.04
    outputs:
      beta: ${{ steps.meta.outputs.beta }}
      exists: ${{ steps.existing.outputs.exists }}
    steps:
      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *b ]]; then
            echo "beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "beta=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    needs: precheck
    if: needs.precheck.outputs.exists != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            goos: linux
            os: linux
            arch: amd64
            opentui_libc: glibc
            bin_ext: ""
          - runner: ubuntu-26.04-arm
            goos: linux
            os: linux
            arch: arm64
            opentui_libc: glibc
            bin_ext: ""
          - runner: macos-26-intel
            goos: darwin
            os: macos
            arch: amd64
            opentui_libc: ""
            bin_ext: ""
          - runner: macos-26
            goos: darwin
            os: macos
            arch: arm64
            opentui_libc: ""
            bin_ext: ""
          - runner: windows-latest
            goos: windows
            os: windows
            arch: amd64
            opentui_libc: ""
            bin_ext: ".exe"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/agenty-runtime/go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/Krypton
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime and CLI
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.arch }}"
          export PACKAGE_DIR="bin/${{ matrix.os }}_${{ matrix.arch }}"
          export BIN_NAME="agenty${{ matrix.bin_ext }}"
          export VERSION="${tag}"
          export OS="${{ matrix.os }}"
          export ARCH="${{ matrix.arch }}"
          export OPENTUI_LIBC="${{ matrix.opentui_libc }}"
          export AGENTY_CLI_VERSION="${tag}"

          pnpm run cli:typecheck
          pnpm run runtime:build
          pnpm run cli:build

      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar -czf "dist/agenty_${tag}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" \
            "apps/cli/dist/agenty-cli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.bin_ext }}"

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs:
      - precheck
      - build
    if: needs.precheck.outputs.exists != 'true'
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BETA: ${{ needs.precheck.outputs.beta }}
        shell: bash
        run: |
          mapfile -t assets < <(find dist -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found."
            exit 1
          fi

          args=(
            release create "${GITHUB_REF_NAME}"
            --verify-tag
            --generate-notes
          )

          if [[ "$BETA" == "true" ]]; then
            args+=(--prerelease)
          fi

          args+=("${assets[@]}")
          gh "${args[@]}"
