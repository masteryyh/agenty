name: Publish release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  precheck:
    name: Resolve release metadata
    runs-on: ubuntu-26.04
    outputs:
      beta: ${{ steps.meta.outputs.beta }}
      exists: ${{ steps.existing.outputs.exists }}
    steps:
      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *b ]]; then
            echo "beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "beta=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-cross:
    name: Cross-compile linux/windows release packages
    needs: precheck
    if: needs.precheck.outputs.exists != 'true'
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/agenty-runtime/go.mod
          cache: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/Krypton
          cache: pnpm

      - name: Build linux/windows release packages
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          targets=(
            "linux|amd64||x86_64-linux-gnu"
            "linux|arm64||aarch64-linux-gnu"
            "windows|amd64|.exe|x86_64-windows-gnu"
          )

          for target in "${targets[@]}"; do
            IFS="|" read -r os arch binary_ext zig_target <<< "$target"
            package_dir="bin/${os}_${arch}"
            runtime_bin="agenty${binary_ext}"
            asset_name="agenty_${tag}_${os}_${arch}.tar.gz"

            echo "Building agenty runtime ${os}/${arch} with zig target ${zig_target}"

            GOOS="${os}" \
            GOARCH="${arch}" \
            CC="zig cc -target ${zig_target}" \
            CXX="zig c++ -target ${zig_target}" \
            PACKAGE_DIR="${package_dir}" \
            BIN_NAME="${runtime_bin}" \
            VERSION="${tag}" \
              pnpm run runtime:build
            
            mv "packages/agenty-runtime/${package_dir}/${runtime_bin}" apps/cli/src/_embedded/agenty-bin
            echo "AGENTY_CLI_VERSION=${tag}" > apps/cli/.env
            OS="${os}" ARCH="${arch}" pnpm run cli:build

            mkdir -p dist
            tar -czf "dist/${asset_name}" "apps/cli/dist/agenty-cli-${os}-${arch}${binary_ext}"
          done

      - name: Upload linux/windows release packages
        uses: actions/upload-artifact@v7
        with:
          name: release-cross
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macos/${{ matrix.arch }}
    needs: precheck
    if: needs.precheck.outputs.exists != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26-intel
            arch: amd64
          - runner: macos-26
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/agenty-runtime/go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/Krypton
          cache: pnpm

      - name: Build macOS release package
        shell: bash
        run: |
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          package_dir="bin/macos_${{ matrix.arch }}"
          asset_name="agenty_${tag}_macos_${{ matrix.arch }}.tar.gz"

          GOOS=darwin \
          GOARCH=${{ matrix.arch }} \
          PACKAGE_DIR="${package_dir}" \
          BIN_NAME="agenty" \
          VERSION="${tag}" \
            pnpm run runtime:build

          mv "packages/agenty-runtime/${package_dir}/agenty" apps/cli/src/_embedded/agenty-bin
          echo "AGENTY_CLI_VERSION=${tag}" > apps/cli/.env

          OS=macos ARCH=${{ matrix.arch }} pnpm run cli:build

          mkdir -p dist
          tar -czf "dist/${asset_name}" apps/cli/dist/agenty-cli-macos-${{ matrix.arch }}

      - name: Upload macOS release package
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs:
      - precheck
      - build-cross
      - build-macos
    if: needs.precheck.outputs.exists != 'true'
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mapfile -t assets < <(find dist -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found."
            exit 1
          fi

          args=(
            release create "${GITHUB_REF_NAME}"
            --verify-tag
            --generate-notes
          )

          if [[ "${{ needs.precheck.outputs.beta }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          args+=("${assets[@]}")
          gh "${args[@]}"
